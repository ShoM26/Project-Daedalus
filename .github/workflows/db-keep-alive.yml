name: Database Keep-Alive Ping

on:
    schedule:
        - cron: '0 12 * * *'
    workflow_dispatch:

jobs:
    ping-database:
        runs-on: ubuntu-latest

        steps:
            - name: Install Database Client
              run: |
                sudo apt-get update
                sudo apt-get install -y default-mysql-client

            - name: Ping Aiven Database
              env:
                DB_HOST: ${{secrets.AIVEN_DB_HOST}}
                DB_PORT: ${{secrets.AIVEN_DB_PORT}}
                DB_USER: ${{secrets.AIVEN_DB_USER}}
                DB_PASSWORD: ${{secrets.AIVEN_DB_PASSWORD}}
              run: |
                mysql -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASSWORD" --ssl-mode=REQUIRED -e "SELECT 1;"